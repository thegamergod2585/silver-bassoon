<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - GameHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }
        .game-wrapper {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #6c5ce7;
            margin-bottom: 20px;
        }
        #gameCanvas {
            border: 3px solid #6c5ce7;
            background: #000;
            display: block;
            margin: 0 auto 20px;
            border-radius: 8px;
        }
        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 18px;
            color: #2d3436;
        }
        .info span {
            font-weight: bold;
            color: #6c5ce7;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .back-btn {
            background: #666;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>🐍 Snake Game</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="info">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
        <div>
            <button onclick="togglePause()">Pause</button>
            <button onclick="resetGame()">Reset</button>
        </div>
        <button class="back-btn" onclick="goHome()">← Back to Home</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let level = 1;
        let gameRunning = true;
        let gamePaused = false;

        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            const key = e.key.toLowerCase();
            if (key === 'arrowup' || key === 'w') if (direction.y === 0) nextDirection = {x: 0, y: -1};
            if (key === 'arrowdown' || key === 's') if (direction.y === 0) nextDirection = {x: 0, y: 1};
            if (key === 'arrowleft' || key === 'a') if (direction.x === 0) nextDirection = {x: -1, y: 0};
            if (key === 'arrowright' || key === 'd') if (direction.x === 0) nextDirection = {x: 1, y: 0};
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            direction = nextDirection;
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score % 50 === 0) level++;
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
                food = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00FF00';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });

            ctx.fillStyle = '#FF0000';
            ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);
        }

        function endGame() {
            gameRunning = false;
            alert(`Game Over! Final Score: ${score}`);
            location.reload();
        }

        function togglePause() {
            gamePaused = !gamePaused;
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            level = 1;
            gameRunning = true;
            gamePaused = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
        }

        function goHome() {
            window.location.href = '../index.html';
        }

        setInterval(() => {
            update();
            draw();
        }, 100 - (level * 5));
    </script>
</body>
</html>
