<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Rider 3D - GameHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .game-main {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1400px;
        }
        .game-section {
            flex: 1;
            min-width: 300px;
        }
        #gameCanvas {
            width: 100%;
            max-width: 700px;
            height: 600px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 4px solid white;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
        }
        .hud div {
            margin: 5px 0;
        }
        .shop-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            min-width: 250px;
            max-height: 600px;
            overflow-y: auto;
        }
        .shop-panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .shop-section {
            margin-bottom: 20px;
        }
        .shop-section h3 {
            color: #764ba2;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .shop-item {
            background: #f5f5f5;
            border: 2px solid #ddd;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .shop-item:hover {
            background: #e8e8e8;
            border-color: #667eea;
        }
        .shop-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .shop-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .shop-item-name {
            font-weight: bold;
            font-size: 14px;
        }
        .shop-item-emoji {
            font-size: 20px;
        }
        .shop-item-price {
            font-size: 12px;
            opacity: 0.8;
        }
        .shop-item-owned {
            font-size: 12px;
            color: #00aa00;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .back-btn {
            background: #666;
        }
        .back-btn:hover:not(:disabled) {
            background: #888;
        }
        .stats-display {
            background: rgba(0, 0, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            color: white;
            font-size: 14px;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            z-index: 100;
        }
        @media (max-width: 900px) {
            .game-main {
                flex-direction: column;
            }
            .shop-panel {
                max-width: 100%;
            }
            #gameCanvas {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-main">
        <div class="game-section">
            <canvas id="gameCanvas" width="700" height="600"></canvas>
            <div class="hud">
                <div>🎿 Distance: <span id="distance">0</span>m</div>
                <div>💰 Money: <span id="money">0</span></div>
                <div>🎁 Presents: <span id="presents">0</span></div>
                <div>📈 Level: <span id="level">1</span></div>
            </div>
            <div class="instructions">
                <p>← → Arrow Keys to Move | Space to Jump | Collect Presents & Dodge Obstacles!</p>
            </div>
        </div>

        <div class="shop-panel">
            <h2>🛒 SHOP</h2>
            
            <div class="stats-display">
                <div>💰 Available: <strong id="shopMoney">0</strong></div>
                <div>🎁 Total Presents: <strong id="shopPresents">0</strong></div>
            </div>

            <div class="shop-section">
                <h3>🛷 Sledges</h3>
                <div id="sledgesContainer"></div>
            </div>

            <div class="shop-section">
                <h3>⚡ Power-ups</h3>
                <div id="powerupsContainer"></div>
            </div>

            <button onclick="goHome()" class="back-btn">← Back to Home</button>
        </div>
    </div>

    <script>
        // 3D Scene Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        // Camera and perspective
        const camera = {
            fov: 60,
            aspect: width / height,
            near: 0.1,
            far: 1000,
            distance: 8
        };

        // 3D Player (Sledge)
        const player = {
            x: 0,
            y: 0,
            z: 0,
            width: 1,
            height: 0.5,
            depth: 2,
            velocityX: 0,
            velocityY: 0,
            velocityZ: 0,
            gravity: 0.15,
            onGround: false,
            rotation: 0
        };

        // Game state
        let gameState = {
            distance: 0,
            money: 0,
            presents: 0,
            level: 1,
            gameRunning: true,
            speed: 0.08,
            activeSledge: 'basic',
            activePowerups: [],
            powerupDuration: {},
            cameraZ: 0
        };

        // Sledge types
        const sledges = {
            basic: { name: 'Basic Sledge', emoji: '🛷', price: 0, speed: 0.08, owned: true, color: '#FF6B6B' },
            gold: { name: 'Gold Sledge', emoji: '🏅', price: 500, speed: 0.1, owned: false, color: '#FFD700' },
            ice: { name: 'Ice Sledge', emoji: '❄️', price: 1000, speed: 0.12, owned: false, color: '#87CEEB' },
            rocket: { name: 'Rocket Sledge', emoji: '🚀', price: 2000, speed: 0.15, owned: false, color: '#FF4444' }
        };

        // Power-ups
        const powerups = {
            shield: { name: 'Shield', emoji: '🛡️', price: 200, duration: 300, owned: 0 },
            magnet: { name: 'Magnet', emoji: '🧲', price: 300, duration: 300, owned: 0 },
            speed: { name: 'Speed Boost', emoji: '⚡', price: 250, duration: 200, owned: 0 }
        };

        // Game objects
        let obstacles = [];
        let collectibles = [];
        const keys = {};

        // Input handling
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                if (player.onGround) {
                    player.velocityY = 0.4;
                    player.onGround = false;
                }
            }
        });
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        // 3D to 2D projection
        function project3D(x, y, z) {
            const scale = camera.distance / (camera.distance + z);
            const screenX = width / 2 + x * scale * (width / 4);
            const screenY = height / 2 - y * scale * (height / 4);
            return { x: screenX, y: screenY, scale: scale };
        }

        // Spawn obstacles
        function spawnObstacle() {
            obstacles.push({
                x: (Math.random() - 0.5) * 6,
                y: 0.5,
                z: -30,
                width: 1.5,
                height: 1.5,
                depth: 1.5,
                type: 'tree',
                emoji: '🌲'
            });
        }

        // Spawn collectibles
        function spawnCollectible() {
            collectibles.push({
                x: (Math.random() - 0.5) * 8,
                y: 1,
                z: -30,
                width: 0.6,
                height: 0.6,
                depth: 0.6,
                type: Math.random() > 0.3 ? 'present' : 'money',
                emoji: Math.random() > 0.3 ? '🎁' : '💰',
                value: Math.random() > 0.3 ? 10 : 25,
                collected: false
            });
        }

        function update() {
            if (!gameState.gameRunning) return;

            // Horizontal movement
            if (keys['ArrowLeft']) player.velocityX = -0.3;
            else if (keys['ArrowRight']) player.velocityX = 0.3;
            else player.velocityX *= 0.85;

            // Keep player in bounds
            if (player.x < -3.5) player.x = -3.5;
            if (player.x > 3.5) player.x = 3.5;

            // Apply gravity
            player.velocityY -= player.gravity;
            player.y += player.velocityY;

            // Ground collision
            if (player.y <= 0) {
                player.y = 0;
                player.velocityY = 0;
                player.onGround = true;
            } else {
                player.onGround = false;
            }

            // Update position
            player.x += player.velocityX;
            gameState.cameraZ += gameState.speed;
            gameState.distance += gameState.speed * 10;
            gameState.level = Math.floor(gameState.distance / 1000) + 1;

            document.getElementById('distance').textContent = Math.floor(gameState.distance);
            document.getElementById('level').textContent = gameState.level;

            // Update speed based on level
            gameState.speed = sledges[gameState.activeSledge].speed + (gameState.level - 1) * 0.02;

            // Update obstacles
            obstacles = obstacles.filter(obs => {
                obs.z += gameState.speed;
                
                // Collision detection
                if (obs.z > player.z - 2 && obs.z < player.z + 2) {
                    if (!gameState.activePowerups.includes('shield')) {
                        if (Math.abs(player.x - obs.x) < (player.width + obs.width) / 2 &&
                            Math.abs(player.y - obs.y) < (player.height + obs.height) / 2) {
                            endGame();
                        }
                    }
                }
                return obs.z < 20;
            });

            // Update collectibles
            collectibles = collectibles.filter(col => {
                col.z += gameState.speed;
                
                if (!col.collected && col.z > player.z - 2 && col.z < player.z + 2) {
                    if (Math.abs(player.x - col.x) < (player.width + col.width) / 2 + 0.5 &&
                        Math.abs(player.y - col.y) < (player.height + col.height) / 2 + 0.5) {
                        col.collected = true;
                        if (col.type === 'present') {
                            gameState.presents += col.value;
                        } else {
                            gameState.money += col.value;
                        }
                        document.getElementById('money').textContent = gameState.money;
                        document.getElementById('presents').textContent = gameState.presents;
                    }
                }
                return col.z < 20;
            });

            // Spawn new objects
            if (Math.random() < 0.03) spawnObstacle();
            if (Math.random() < 0.02) spawnCollectible();

            // Update powerup durations
            Object.keys(gameState.powerupDuration).forEach(key => {
                gameState.powerupDuration[key]--;
                if (gameState.powerupDuration[key] <= 0) {
                    gameState.activePowerups = gameState.activePowerups.filter(p => p !== key);
                    delete gameState.powerupDuration[key];
                }
            });
        }

        function draw() {
            // Clear and draw sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Draw snow ground
            ctx.fillStyle = '#FFFFFF';
            const groundProj = project3D(0, -1, -10);
            ctx.fillRect(0, groundProj.y, width, height - groundProj.y);

            // Draw grid for depth perception
            ctx.strokeStyle = 'rgba(200, 200, 200, 0.3)';
            ctx.lineWidth = 1;
            for (let z = gameState.cameraZ - 20; z < gameState.cameraZ + 5; z += 5) {
                const proj = project3D(-5, -1, z);
                const proj2 = project3D(5, -1, z);
                ctx.beginPath();
                ctx.moveTo(proj.x, proj.y);
                ctx.lineTo(proj2.x, proj2.y);
                ctx.stroke();
            }

            // Draw collectibles
            for (let col of collectibles) {
                const proj = project3D(col.x, col.y, col.z);
                if (proj.scale > 0) {
                    const size = 20 * proj.scale;
                    ctx.font = `${Math.max(10, size)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.globalAlpha = col.collected ? 0.3 : 1;
                    ctx.fillText(col.emoji, proj.x, proj.y);
                    ctx.globalAlpha = 1;
                }
            }

            // Draw obstacles
            for (let obs of obstacles) {
                const proj = project3D(obs.x, obs.y, obs.z);
                if (proj.scale > 0) {
                    const size = 40 * proj.scale;
                    ctx.font = `${Math.max(15, size)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(obs.emoji, proj.x, proj.y);
                }
            }

            // Draw player sledge
            const playerProj = project3D(player.x, player.y, player.z);
            const playerSize = 50 * playerProj.scale;
            
            // Draw sledge
            ctx.fillStyle = sledges[gameState.activeSledge].color;
            ctx.globalAlpha = 0.7;
            ctx.fillRect(playerProj.x - playerSize / 2, playerProj.y - playerSize / 3, playerSize, playerSize / 2);
            ctx.globalAlpha = 1;

            // Draw player on sledge
            ctx.font = `${Math.max(20, playerSize)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧑', playerProj.x, playerProj.y - playerSize / 3);

            // Draw shield if active
            if (gameState.activePowerups.includes('shield')) {
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(playerProj.x, playerProj.y, playerSize / 2 + 10, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Draw magnet effect if active
            if (gameState.activePowerups.includes('magnet')) {
                ctx.strokeStyle = 'rgba(255, 100, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(playerProj.x, playerProj.y, playerSize, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState.gameRunning = false;
            alert(`Game Over! Distance: ${Math.floor(gameState.distance)}m\nMoney Earned: ${gameState.money}\nPresents: ${gameState.presents}`);
            location.reload();
        }

        // Shop functions
        function buySledge(sledgeType) {
            const sledge = sledges[sledgeType];
            if (!sledge.owned && gameState.money >= sledge.price) {
                gameState.money -= sledge.price;
                sledge.owned = true;
                gameState.activeSledge = sledgeType;
                updateShop();
                document.getElementById('money').textContent = gameState.money;
            }
        }

        function selectSledge(sledgeType) {
            if (sledges[sledgeType].owned) {
                gameState.activeSledge = sledgeType;
                updateShop();
            }
        }

        function buyPowerup(powerupType) {
            const powerup = powerups[powerupType];
            if (gameState.money >= powerup.price) {
                gameState.money -= powerup.price;
                powerup.owned++;
                updateShop();
                document.getElementById('money').textContent = gameState.money;
            }
        }

        function usePowerup(powerupType) {
            const powerup = powerups[powerupType];
            if (powerup.owned > 0 && !gameState.activePowerups.includes(powerupType)) {
                powerup.owned--;
                gameState.activePowerups.push(powerupType);
                gameState.powerupDuration[powerupType] = powerup.duration;
                updateShop();
            }
        }

        function updateShop() {
            // Update sledges
            const sledgesContainer = document.getElementById('sledgesContainer');
            sledgesContainer.innerHTML = '';
            Object.entries(sledges).forEach(([key, sledge]) => {
                const div = document.createElement('div');
                div.className = 'shop-item' + (gameState.activeSledge === key ? ' active' : '');
                div.innerHTML = `
                    <div class="shop-item-header">
                        <span class="shop-item-name">${sledge.emoji} ${sledge.name}</span>
                        <span class="shop-item-emoji">⚡${(sledge.speed * 100).toFixed(0)}</span>
                    </div>
                    <div class="shop-item-price">${sledge.price === 0 ? 'Free' : '💰 ' + sledge.price}</div>
                    ${sledge.owned ? '<div class="shop-item-owned">✓ Owned</div>' : ''}
                `;
                if (!sledge.owned) {
                    div.onclick = () => buySledge(key);
                } else {
                    div.onclick = () => selectSledge(key);
                }
                sledgesContainer.appendChild(div);
            });

            // Update powerups
            const powerupsContainer = document.getElementById('powerupsContainer');
            powerupsContainer.innerHTML = '';
            Object.entries(powerups).forEach(([key, powerup]) => {
                const div = document.createElement('div');
                const isActive = gameState.activePowerups.includes(key);
                div.className = 'shop-item' + (isActive ? ' active' : '');
                div.innerHTML = `
                    <div class="shop-item-header">
                        <span class="shop-item-name">${powerup.emoji} ${powerup.name}</span>
                        <span class="shop-item-emoji">×${powerup.owned}</span>
                    </div>
                    <div class="shop-item-price">💰 ${powerup.price}</div>
                    ${isActive ? '<div class="shop-item-owned">✓ Active</div>' : ''}
                `;
                if (isActive) {
                    div.style.opacity = '0.7';
                    div.style.pointerEvents = 'none';
                } else if (powerup.owned > 0) {
                    div.onclick = () => usePowerup(key);
                } else {
                    div.onclick = () => buyPowerup(key);
                }
                powerupsContainer.appendChild(div);
            });

            document.getElementById('shopMoney').textContent = gameState.money;
            document.getElementById('shopPresents').textContent = gameState.presents;
        }

        function goHome() {
            window.location.href = '../index.html';
        }

        // Initialize
        updateShop();
        gameLoop();
    </script>
</body>
</html>
